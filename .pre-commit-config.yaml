# .pre-commit-config.yaml
# Автоматически запускает линтеры перед каждым git commit.
#
# Установка:
#   pip install pre-commit
#   pre-commit install
#
# Ручной запуск на всех файлах:
#   pre-commit run --all-files

repos:
  # Базовые проверки файлов
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: debug-statements

  # Ruff — линтер + форматтер
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.7
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # Mypy — проверка типов.
  # Модули с pybit (bot, backtest, exchange...) исключены через pyproject.toml
  # [tool.mypy.overrides] ignore_errors = true — они требуют pybit в runtime.
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        exclude: ^alembic/
        additional_dependencies:
          - pandas-stubs>=2.0.0
          - types-requests>=2.31.0
        args: ["--ignore-missing-imports"]
